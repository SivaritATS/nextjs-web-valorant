services:
  db:
    image: mysql:8.0
    container_name: valorant_mysql
    restart: always
    environment:
      MYSQL_DATABASE: valorant_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: valorant_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
volumes:
  mysql_data:
